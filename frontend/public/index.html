<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#FF6B35" />
    <meta name="description" content="Nati Fenua - Le réseau social de la Polynésie Française. Connectez-vous avec la communauté tahitienne." />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nati Fenua" />
    <meta name="application-name" content="Nati Fenua" />
    <meta name="msapplication-TileColor" content="#FF6B35" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- iOS specific fixes -->
    <meta name="apple-touch-fullscreen" content="yes" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/nati-fenua-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/icons/nati-fenua-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/icons/nati-fenua-167.png" />
    
    <!-- Splash Screens for iOS -->
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/splash/splash-640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/splash/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/splash/splash-1242x2208.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/splash/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    
    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <title>Nati Fenua - Polynésie Française</title>
    
    <style>
      /* iOS Safari viewport fix */
      html {
        height: -webkit-fill-available;
      }
      
      body {
        min-height: 100vh;
        min-height: -webkit-fill-available;
        /* Prevent pull-to-refresh on mobile */
        overscroll-behavior-y: contain;
        /* iOS safe area */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      
      /* Fix iOS input zoom */
      input, select, textarea {
        font-size: 16px !important;
      }
      
      /* Fix iOS touch delay */
      * {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      
      /* Install banner styles */
      .pwa-install-banner {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(135deg, #FF6B35, #FF1493);
        color: white;
        padding: 16px;
        padding-bottom: calc(16px + env(safe-area-inset-bottom));
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        z-index: 9999;
        transform: translateY(100%);
        transition: transform 0.3s ease;
      }
      
      .pwa-install-banner.show {
        transform: translateY(0);
      }
      
      .pwa-install-banner button {
        background: white;
        color: #FF6B35;
        border: none;
        padding: 10px 20px;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
      }
      
      .pwa-install-banner .close {
        background: transparent;
        color: white;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <noscript>Vous devez activer JavaScript pour utiliser Nati Fenua.</noscript>
    <div id="root"></div>
    
    <!-- PWA Install Banner -->
    <div id="pwa-install-banner" class="pwa-install-banner">
      <div style="flex: 1;">
        <strong>Installer Nati Fenua</strong>
        <p style="margin: 4px 0 0; font-size: 14px; opacity: 0.9;">Ajoutez l'app sur votre écran d'accueil</p>
      </div>
      <button id="pwa-install-btn">Installer</button>
      <button id="pwa-close-btn" class="close">✕</button>
    </div>
    
    <script>
      // Error handling for iOS Safari
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('JS Error:', msg, url, lineNo);
        return false;
      };
      
      // Polyfill for older Safari
      if (!window.Promise) {
        console.error('Promise not supported');
      }
      
      // Register Service Worker with error handling
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Delay SW registration on iOS to prevent blocking
          const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
          const delay = isIOS ? 2000 : 0;
          
          setTimeout(() => {
            navigator.serviceWorker.register('/service-worker.js')
              .then((registration) => {
                console.log('SW registered:', registration.scope);
                // Force update check every time page loads (fixes stale cache on iOS)
                registration.update();
                // When a new SW takes control, reload the page once to load fresh assets
                let reloaded = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                  if (reloaded) return;
                  reloaded = true;
                  window.location.reload();
                });
                // If a new SW is waiting, tell it to skip waiting
                if (registration.waiting) {
                  registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                }
                registration.addEventListener('updatefound', () => {
                  const newWorker = registration.installing;
                  if (newWorker) {
                    newWorker.addEventListener('statechange', () => {
                      if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                      }
                    });
                  }
                });
              })
              .catch((error) => {
                console.log('SW registration failed:', error);
              });
          }, delay);
        });
      }
      
      // PWA Install Prompt
      let deferredPrompt;
      const installBanner = document.getElementById('pwa-install-banner');
      const installBtn = document.getElementById('pwa-install-btn');
      const closeBtn = document.getElementById('pwa-close-btn');
      
      if (installBanner && installBtn && closeBtn) {
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          deferredPrompt = e;
          
          // Show install banner after 3 seconds
          setTimeout(() => {
            installBanner.classList.add('show');
          }, 3000);
        });
        
        installBtn.addEventListener('click', async () => {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('Install outcome:', outcome);
            deferredPrompt = null;
          }
          installBanner.classList.remove('show');
        });
        
        closeBtn.addEventListener('click', () => {
          installBanner.classList.remove('show');
        });
      }
      
      // Hide banner if already installed
      window.addEventListener('appinstalled', () => {
        if (installBanner) installBanner.classList.remove('show');
        deferredPrompt = null;
        console.log('PWA installed');
      });
      
      // Check if running as PWA
      if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) {
        console.log('Running as PWA');
      }
    </script>
  </body>
</html>
