<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Nati Fenua avec Drapeau Polynésien</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            gap: 40px;
        }
        .logo-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo-preview {
            width: 300px;
            height: 300px;
            position: relative;
        }
        .main-logo {
            width: 300px;
            height: 300px;
            border-radius: 60px;
            background: linear-gradient(135deg, #FF6B35 0%, #FF1493 50%, #00CED1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .letter-n {
            font-family: Georgia, serif;
            font-size: 180px;
            font-weight: bold;
            color: white;
            margin-left: -20px;
        }
        .flag-badge {
            position: absolute;
            bottom: -10px;
            right: -10px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid white;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .flag-badge img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            color: #1A1A2E;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-top: 20px;
        }
        .download-links {
            margin-top: 30px;
        }
        .download-links a {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #FF6B35, #FF1493);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            margin: 5px;
            font-weight: bold;
        }
        .download-links a:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <h1>🌺 Logo Nati Fenua avec Drapeau Polynésien</h1>
    
    <div class="logo-container">
        <div class="logo-preview">
            <div class="main-logo">
                <span class="letter-n">N</span>
                <div class="flag-badge">
                    <img src="assets/drapeau-polynesie.png" alt="Drapeau Polynésie">
                </div>
            </div>
        </div>
        <p>Logo officiel Nati Fenua avec emblème de la Polynésie Française</p>
    </div>
    
    <div class="download-links">
        <a href="assets/logo-nati-fenua-avec-drapeau-pf.svg" download>📥 Télécharger SVG</a>
        <a href="assets/drapeau-polynesie.png" download>📥 Drapeau seul (PNG)</a>
    </div>
</body>
</html>
