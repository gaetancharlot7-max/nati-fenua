<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#FF1493"/>
      <stop offset="100%" style="stop-color:#00CED1"/>
    </linearGradient>
    <clipPath id="flagCircle">
      <circle cx="420" cy="420" r="75"/>
    </clipPath>
  </defs>
  
  <!-- Logo principal - Fond dégradé -->
  <rect width="512" height="512" rx="100" fill="url(#gradient)"/>
  
  <!-- Lettre N (décalée légèrement à gauche) -->
  <text x="230" y="380" font-family="Georgia, serif" font-size="320" font-weight="bold" fill="white" text-anchor="middle">N</text>
  
  <!-- Drapeau Polynésien en bas à droite (cercle) -->
  <g clip-path="url(#flagCircle)">
    <image 
      x="345" 
      y="345" 
      width="150" 
      height="150" 
      href="assets/drapeau-polynesie.png"
      preserveAspectRatio="xMidYMid slice"
    />
  </g>
  
  <!-- Bordure blanche du badge drapeau -->
  <circle cx="420" cy="420" r="75" fill="none" stroke="white" stroke-width="5"/>
</svg>