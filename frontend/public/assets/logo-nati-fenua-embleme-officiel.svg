<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="100"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#roundedClip)">
    <!-- Drapeau Polynésie Française - Bandes -->
    <rect width="512" height="512" fill="#CE1126"/>
    <rect y="128" width="512" height="256" fill="#FFFFFF"/>
    
    <!-- Emblème central - Pirogue avec rayons de soleil -->
    <g transform="translate(256, 256)">
      <!-- Cercle soleil -->
      <circle r="90" fill="#FFD700"/>
      
      <!-- Rayons du soleil (5) -->
      <g fill="#CE1126">
        <polygon points="0,-110 10,-70 -10,-70"/>
        <polygon points="104,-34 66,-30 56,-50"/>
        <polygon points="64,89 44,55 30,70"/>
        <polygon points="-64,89 -44,55 -30,70"/>
        <polygon points="-104,-34 -66,-30 -56,-50"/>
      </g>
      
      <!-- Mer/Vagues -->
      <ellipse rx="70" ry="20" cy="25" fill="#1E50A0"/>
      
      <!-- Pirogue (va'a) -->
      <path d="M-50,15 Q-60,25 -45,30 L45,30 Q60,25 50,15 Z" fill="#8B4513"/>
      
      <!-- Mât et voile -->
      <rect x="-2" y="-40" width="4" height="70" fill="#8B4513"/>
      <path d="M2,-35 L2,20 L40,-10 Z" fill="#FFFFFF" stroke="#8B4513" stroke-width="1"/>
      
      <!-- 5 personnages stylisés (Tiki) -->
      <g fill="#000000">
        <circle cx="-30" cy="5" r="5"/>
        <circle cx="-15" cy="5" r="5"/>
        <circle cx="0" cy="5" r="5"/>
        <circle cx="15" cy="5" r="5"/>
        <circle cx="30" cy="5" r="5"/>
      </g>
    </g>
    
    <!-- Lettre N superposée avec transparence -->
    <text x="256" y="320" font-family="Georgia, serif" font-size="200" font-weight="bold" 
          fill="white" fill-opacity="0.9" text-anchor="middle" 
          stroke="#CE1126" stroke-width="4">N</text>
  </g>
  
  <!-- Bordure -->
  <rect width="512" height="512" rx="100" fill="none" stroke="#CE1126" stroke-width="8"/>
</svg>