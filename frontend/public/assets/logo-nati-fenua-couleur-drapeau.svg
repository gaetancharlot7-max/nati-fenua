<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#FF1493"/>
      <stop offset="100%" style="stop-color:#00CED1"/>
    </linearGradient>
    <linearGradient id="goldSun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <clipPath id="flagClip">
      <circle cx="430" cy="430" r="70"/>
    </clipPath>
  </defs>
  
  <!-- Logo principal - Fond dégradé -->
  <rect width="512" height="512" rx="100" fill="url(#gradient)"/>
  
  <!-- Lettre N -->
  <text x="256" y="380" font-family="Georgia, serif" font-size="320" font-weight="bold" fill="white" text-anchor="middle">N</text>
  
  <!-- Drapeau Polynésien en bas à droite -->
  <g clip-path="url(#flagClip)">
    <!-- Fond du drapeau -->
    <circle cx="430" cy="430" r="70" fill="#CE1126"/>
    <!-- Bande blanche centrale -->
    <rect x="360" y="410" width="140" height="40" fill="#FFFFFF"/>
    
    <!-- Emblème central simplifié -->
    <circle cx="430" cy="430" r="22" fill="url(#goldSun)"/>
    
    <!-- Mini rayons du soleil -->
    <g fill="#CE1126">
      <polygon points="430,400 434,415 426,415"/>
      <polygon points="455,420 445,425 445,418"/>
      <polygon points="450,450 442,442 448,438"/>
      <polygon points="410,450 418,442 412,438"/>
      <polygon points="405,420 415,425 415,418"/>
    </g>
    
    <!-- Mini pirogue -->
    <ellipse cx="430" cy="435" rx="12" ry="4" fill="#1E50A0"/>
  </g>
  
  <!-- Bordure du badge drapeau -->
  <circle cx="430" cy="430" r="70" fill="none" stroke="white" stroke-width="4"/>
</svg>