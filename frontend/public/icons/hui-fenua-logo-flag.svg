<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dégradé du contour -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#FF1493"/>
      <stop offset="100%" style="stop-color:#00CED1"/>
    </linearGradient>
    
    <!-- Dégradé du H -->
    <linearGradient id="hGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#FF1493"/>
      <stop offset="100%" style="stop-color:#00CED1"/>
    </linearGradient>
    
    <!-- Ombre portée -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Fond avec dégradé (contour) -->
  <rect x="20" y="20" width="472" height="472" rx="80" ry="80" fill="url(#borderGradient)" filter="url(#shadow)"/>
  
  <!-- Carré blanc intérieur -->
  <rect x="32" y="32" width="448" height="448" rx="68" ry="68" fill="white"/>
  
  <!-- Lettre H avec dégradé -->
  <text x="256" y="340" font-family="Arial Black, sans-serif" font-size="280" font-weight="900" fill="url(#hGradient)" text-anchor="middle">H</text>
  
  <!-- Drapeau Polynésien en bas à droite -->
  <g transform="translate(340, 340)">
    <!-- Fond du drapeau avec bordure -->
    <rect x="0" y="0" width="120" height="80" rx="8" ry="8" fill="white" stroke="#ccc" stroke-width="1"/>
    
    <!-- Bande rouge haut -->
    <rect x="0" y="0" width="120" height="26.6" rx="8" ry="8" fill="#CE1126"/>
    <rect x="0" y="8" width="120" height="18.6" fill="#CE1126"/>
    
    <!-- Bande blanche milieu -->
    <rect x="0" y="26.6" width="120" height="26.6" fill="white"/>
    
    <!-- Bande rouge bas -->
    <rect x="0" y="53.2" width="120" height="26.8" fill="#CE1126"/>
    <rect x="0" y="53.2" width="120" height="18.8" fill="#CE1126"/>
    <rect x="0" y="72" width="120" height="8" rx="8" ry="8" fill="#CE1126"/>
    
    <!-- Emblème central - Cercle doré -->
    <circle cx="60" cy="40" r="22" fill="#FFD700" stroke="#CE1126" stroke-width="2"/>
    
    <!-- Pirogue stylisée dans le cercle -->
    <ellipse cx="60" cy="44" rx="14" ry="4" fill="#CE1126"/>
    <line x1="60" y1="28" x2="60" y2="44" stroke="#CE1126" stroke-width="2"/>
    <polygon points="50,32 60,28 70,32" fill="#CE1126"/>
    
    <!-- Rayons du soleil -->
    <g fill="#CE1126">
      <rect x="58" y="20" width="4" height="6"/>
      <rect x="72" y="36" width="6" height="4"/>
      <rect x="42" y="36" width="6" height="4"/>
    </g>
  </g>
</svg>
